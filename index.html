<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's Up Polk County - Live News</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; background: #f7fafc; color: #2d3748; }
        header { text-align: center; margin-bottom: 25px; padding: 30px 20px; background: #1a365d; color: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin: 0 0 10px 0; font-size: 2rem; }
        .subtitle { color: #e2e8f0; font-size: 1rem; margin: 0; opacity: 0.9; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; border-left: 6px solid #3182ce; }
        .meta { font-size: 0.85rem; color: #718096; margin-bottom: 12px; display: flex; justify-content: space-between; font-weight: 600; border-bottom: 1px solid #edf2f7; padding-bottom: 8px; }
        .content { white-space: pre-wrap; font-size: 1.05rem; color: #2d3748; }
        #loading { text-align: center; font-size: 1.2rem; color: #4a5568; padding: 20px; }
        #error-msg { text-align: center; color: #e53e3e; background: #fff5f5; padding: 15px; border-radius: 8px; display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>What's Up Polk County</h1>
        <p class="subtitle">Automated Local News Feed Mirror</p>
    </header>

    <div id="loading">🔄 Loading local news database...</div>
    <div id="error-msg"></div>
    <div id="news-container"></div>

    <script>
        // Silently reload the window exactly every 5 minutes (300,000 milliseconds)
        setTimeout(() => {
            window.location.reload();
        }, 300000);

        // Fetch local database with a timestamp string to force fresh downloads
        fetch(`news.json?t=${new Date().getTime()}`)
            .then(response => {
                if (!response.ok) throw new Error("The news database file is currently rebuilding.");
                return response.json();
            })
            .then(data => {
                const container = document.getElementById('news-container');
                document.getElementById('loading').style.display = 'none';
                
                if (!data || data.length === 0) {
                    container.innerHTML = "<p style='text-align:center;'>Waiting for the background script sync to complete...</p>";
                    return;
                }

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="meta">
                            <span>📍 Polk County Update</span>
                            <span>⏱️ ${item.scraped_at}</span>
                        </div>
                        <div class="content">${item.content}</div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(error => {
                document.getElementById('loading').style.display = 'none';
                const errorDiv = document.getElementById('error-msg');
                errorDiv.innerText = error.message;
                errorDiv.style.display = 'block';
            });
    </script>
</body>
</html>
